<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="frontend/styles.css">
    <title>Weather App</title>
</head>
<body>
    <div class="container">
        
        <div class="search-container">
            <input type="search" name="search" id="search" class="search-bar" placeholder="Search for a city...">
        </div>

        <div class="weather-details">

            <!--country name and its real time-->
            <div class="all-details">
                <div class="country-time">
                    <h1 class="country" id="country">TEST COUNTRY NAME</h1>
                    <h3 class="time" id="time">TEST TIME</h3>
                </div>
                
                <hr>

                <div class="details">
                    </div>                
            </div>            

            <!--an aside box for day activities-->
            <aside>
                <h2>Activities</h2>
                <!--image slider for the activities-->
                <div class="image-slider" id="image-slider"></div>
            </aside>
        </div>

        <!--this box only for the next days-->
        <div class="weather-next-days-box">
            <h3>7-Day Forecast</h3>
            <div class="box">
                </div>
        </div>
        
        <footer>
            <p>&copy; All rights reserved 2026-2027</p>
        </footer>
    </div>
    
    <script src="./backend/script.js"></script>
</body>
</html>
